{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Airsapa{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
    <link href="{% static 'css/mymargins.css' %}" rel="stylesheet">
    <link href="{% static 'css/layout.css' %}" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

    <!--Chart.js here--> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    {% block extra_css %}{% endblock %}

</head>
<body>
    
    {% include 'navbar.html' %}
    
    <div class="container-fluid">
        <div class="row">
            {% include 'sidebar.html' %}
            <main class="center-container px-0 flex-container d-flex flex-column bg-light" style="height: 100vh; overflow-y: auto;">

                <div class="m-lg-3 mt-7 ms-2">
                    {% block content %}
                    {% endblock content %}
                </div>
            
                <div class="mt-auto footer">
                    <small class="text-dark" style="font-size: 12px">© 2024 Shift Your Dream | <a href="" class="text-dark">About</a> | <a href="#" class="text-dark text-decoration-none">Terms</a></small>
                </div>
                <br>
            </main>
        </div>
    </div>



   


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
